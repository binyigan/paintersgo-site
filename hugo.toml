baseURL = "https://paintersgo.top/"
defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false
theme = "PaperMod"

[params]
    env = "production"
    title = "PaintersGO"
    disableThemeToggle = true

    [params.assets]
        favicon = "logo.png"
        favicon16x16 = "logo.png"
        favicon32x32 = "logo.png"
        apple_touch_icon = "logo.png"
        safari_pinned_tab = "logo-mark.svg"

    [params.label]
        text = "PaintersGO"
        icon = "logo.png"
        iconHeight = 35

[languages]
    [languages.zh-cn]
        languageCode = "zh-CN"
        languageName = "中文"
        weight = 1
        title = "PaintersGO 官方网站"

        [languages.zh-cn.params]
            description = "面向 3D、视频与 AR 沉浸式表达的创意体验平台"

    [languages.en]
        languageCode = "en-US"
        languageName = "English"
        weight = 2
        title = "PaintersGO Official Site"

        [languages.en.params]
            description = "Creative mobile experience for 3D, video and AR presentation"

[markup.goldmark.renderer]
    unsafe = true
