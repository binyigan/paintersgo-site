<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>PaintersGO Lite Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(10, 10, 10, 0.72);
        --panel-border: rgba(255, 255, 255, 0.12);
        --text: #f6f3ee;
        --muted: rgba(246, 243, 238, 0.7);
        --accent: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0f0c0a;
        font-family: Inter, "Segoe UI", sans-serif;
        color: var(--text);
      }

      body {
        position: relative;
      }

      #viewer-canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }

      .panel {
        position: absolute;
        z-index: 10;
        border: 1px solid var(--panel-border);
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      }

      .topbar {
        top: 14px;
        left: 14px;
        right: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        border-radius: 20px;
        padding: 12px 14px;
      }

      .brand-block {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), #fb7185);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #170f08;
        letter-spacing: 0.18em;
      }

      .brand-copy strong,
      .brand-copy span {
        display: block;
      }

      .brand-copy strong {
        font-size: 13px;
      }

      .brand-copy span {
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .chip {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        cursor: pointer;
        font-size: 11px;
        padding: 8px 10px;
        transition: 160ms ease;
      }

      .chip:hover {
        background: rgba(255, 255, 255, 0.13);
      }

      .chip.is-active {
        background: var(--accent);
        color: #1d1309;
      }

      .infocard {
        left: 14px;
        bottom: 14px;
        width: min(22rem, calc(100% - 28px));
        border-radius: 24px;
        padding: 16px 18px;
      }

      .infocard p {
        margin: 0;
      }

      .infocard .eyebrow {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .infocard .title {
        margin-top: 10px;
        font-size: 20px;
        font-weight: 600;
        line-height: 1.25;
      }

      .infocard .body {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.7;
      }

      .status {
        position: absolute;
        right: 14px;
        bottom: 14px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: min(18rem, calc(100% - 28px));
      }

      .status-card {
        border-radius: 18px;
        padding: 12px 14px;
      }

      .status-card p {
        margin: 0;
      }

      .status-label {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .status-value {
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.7;
      }

      @media (max-width: 900px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .controls {
          justify-content: flex-start;
        }

        .status {
          width: calc(100% - 28px);
        }

        .infocard {
          width: calc(100% - 28px);
        }
      }
    </style>
  </head>
  <body>
    <canvas id="viewer-canvas"></canvas>

    <div class="panel topbar">
      <div class="brand-block">
        <div class="brand-mark">PG</div>
        <div class="brand-copy">
          <strong>PaintersGO Lite Viewer</strong>
          <span>从 App WebView 核心裁出的浏览器预览器</span>
        </div>
      </div>

      <div class="controls" id="controls"></div>
    </div>

    <div class="panel infocard">
      <p class="eyebrow">Live Editor Lite</p>
      <p class="title">网页版先试看模型，再决定要不要进入完整 App</p>
      <p class="body" id="viewer-description">
        当前是浏览器可运行的 Lite Viewer，场景和材质思路来自 PaintersGO App 里的 Three.js WebView 内核。
      </p>
    </div>

    <div class="status">
      <div class="panel status-card">
        <p class="status-label">Material</p>
        <p class="status-value" id="material-status">Loading</p>
      </div>
      <div class="panel status-card">
        <p class="status-label">Model</p>
        <p class="status-value" id="model-status">Procedural placeholder</p>
      </div>
    </div>

    <script src="./three.min.js"></script>
    <script src="./OrbitControls.js"></script>
    <script src="./GLTFLoader.js"></script>
    <script src="./STLLoader.js"></script>
    <script src="./app-lite.js"></script>
  </body>
</html>
