{{- if .IsHome }}
<style>
  :root {
    --pg-accent: #ff7a18;
    --pg-accent-soft: rgba(255, 122, 24, 0.14);
    --pg-accent-strong: #ff5b2e;
    --pg-surface: linear-gradient(180deg, rgba(255, 248, 241, 0.96), rgba(255, 255, 255, 0.92));
    --pg-card: rgba(255, 255, 255, 0.84);
    --pg-border: rgba(255, 122, 24, 0.16);
    --pg-shadow: 0 22px 60px rgba(110, 59, 20, 0.12);
    --pg-deep-shadow: 0 26px 70px rgba(84, 46, 17, 0.18);
  }

  .list {
    background:
      radial-gradient(circle at top left, rgba(255, 154, 72, 0.18), transparent 28%),
      radial-gradient(circle at top right, rgba(255, 220, 173, 0.2), transparent 25%),
      linear-gradient(180deg, #fff7ee 0%, #fffdfa 38%, #ffffff 100%);
  }

  .main {
    max-width: 1180px;
  }

  .post-content {
    margin-top: 0;
  }

  .post-content .home-showcase {
    display: grid;
    gap: 28px;
    margin: 12px 0 56px;
  }

  .post-content .home-hero {
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
    gap: 28px;
    padding: 36px;
    border: 1px solid var(--pg-border);
    border-radius: 30px;
    background: var(--pg-surface);
    box-shadow: var(--pg-shadow);
  }

  .post-content .home-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(120deg, rgba(255, 255, 255, 0.3), transparent 40%),
      radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.48), transparent 22%);
    pointer-events: none;
  }

  .post-content .home-hero::after {
    content: "";
    position: absolute;
    inset: auto -100px -100px auto;
    width: 280px;
    height: 280px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(255, 122, 24, 0.22), transparent 68%);
    pointer-events: none;
  }

  .post-content .hero-copy,
  .post-content .hero-media,
  .post-content .showcase-section,
  .post-content .media-card,
  .post-content .feature-card,
  .post-content .download-strip {
    position: relative;
    z-index: 1;
  }

  .post-content .hero-copy,
  .post-content .showcase-section {
    animation: pgFadeUp 0.7s ease both;
  }

  .post-content .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--pg-accent-soft);
    color: #9b4300;
    font-size: 0.92rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .post-content .hero-title {
    margin: 18px 0 12px;
    font-size: clamp(2.3rem, 4vw, 4.3rem);
    line-height: 1.02;
    letter-spacing: -0.04em;
  }

  .post-content .hero-subtitle {
    max-width: 62ch;
    margin: 0;
    color: var(--secondary);
    font-size: 1.05rem;
    line-height: 1.85;
  }

  .post-content .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 24px;
  }

  .post-content .cta-primary,
  .post-content .cta-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 160px;
    padding: 14px 20px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .post-content .cta-primary {
    background: linear-gradient(135deg, var(--pg-accent), var(--pg-accent-strong));
    color: #fff;
    box-shadow: 0 18px 40px rgba(255, 91, 46, 0.28);
  }

  .post-content .cta-secondary {
    border: 1px solid var(--pg-border);
    background: rgba(255, 255, 255, 0.72);
    color: var(--primary);
  }

  .post-content .cta-primary:hover,
  .post-content .cta-secondary:hover {
    transform: translateY(-2px);
  }

  .post-content .cta-secondary:hover {
    border-color: rgba(255, 122, 24, 0.35);
  }

  .post-content .hero-points {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 24px;
  }

  .post-content .hero-point,
  .post-content .hero-stat {
    padding: 14px 16px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.74);
    border: 1px solid rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
  }

  .post-content .hero-point strong {
    display: block;
    margin-bottom: 6px;
    font-size: 1rem;
  }

  .post-content .hero-point span,
  .post-content .hero-stat span {
    color: var(--secondary);
    font-size: 0.94rem;
    line-height: 1.65;
  }

  .post-content .hero-stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 14px;
  }

  .post-content .hero-stat strong {
    display: block;
    margin-bottom: 6px;
    color: #a24b08;
    font-size: 1.7rem;
    line-height: 1;
  }

  .post-content .hero-media {
    position: relative;
    align-self: stretch;
  }

  .post-content .hero-media img {
    width: 100%;
    height: 100%;
    min-height: 420px;
    object-fit: cover;
    border-radius: 24px;
    box-shadow: var(--pg-deep-shadow);
  }

  .post-content .floating-note {
    position: absolute;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.84);
    border: 1px solid rgba(255, 255, 255, 0.92);
    box-shadow: 0 16px 34px rgba(63, 34, 10, 0.14);
    color: #8d4307;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    backdrop-filter: blur(10px);
  }

  .post-content .note-top {
    top: 18px;
    right: 18px;
  }

  .post-content .note-bottom {
    left: 18px;
    bottom: 18px;
  }

  .post-content .section-grid {
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: 18px;
  }

  .post-content .showcase-section {
    padding: 28px;
    border-radius: 26px;
    background: var(--pg-card);
    border: 1px solid rgba(255, 255, 255, 0.7);
    box-shadow: var(--pg-shadow);
    backdrop-filter: blur(14px);
  }

  .post-content .showcase-section.full-span {
    grid-column: span 12;
  }

  .post-content .showcase-section.span-7 {
    grid-column: span 7;
  }

  .post-content .showcase-section.span-5 {
    grid-column: span 5;
  }

  .post-content .section-kicker {
    display: inline-block;
    margin-bottom: 10px;
    color: #b35600;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .post-content .section-title {
    margin: 0 0 8px;
    font-size: 1.85rem;
    line-height: 1.2;
  }

  .post-content .section-intro {
    max-width: 72ch;
    margin: 0 0 20px;
    color: var(--secondary);
    line-height: 1.8;
  }

  .post-content .feature-grid,
  .post-content .media-grid,
  .post-content .video-grid {
    display: grid;
    gap: 16px;
  }

  .post-content .feature-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .post-content .media-grid,
  .post-content .video-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .post-content .feature-card,
  .post-content .media-card {
    padding: 18px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.9);
    transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
  }

  .post-content .feature-card:hover,
  .post-content .media-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 122, 24, 0.25);
    box-shadow: 0 22px 44px rgba(80, 41, 13, 0.12);
  }

  .post-content .feature-card h3,
  .post-content .media-card h3 {
    margin: 0 0 8px;
    font-size: 1.08rem;
  }

  .post-content .feature-card p,
  .post-content .media-card p {
    margin: 0;
    color: var(--secondary);
    line-height: 1.75;
  }

  .post-content .media-card img,
  .post-content .media-card video {
    width: 100%;
    border-radius: 18px;
    display: block;
    margin-bottom: 14px;
    background: #eadfd4;
  }

  .post-content .media-card img {
    aspect-ratio: 16 / 10;
    object-fit: cover;
  }

  .post-content .media-card video {
    aspect-ratio: 16 / 9;
    object-fit: cover;
  }

  .post-content .download-strip {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 20px;
    padding: 24px 28px;
    border-radius: 26px;
    background: linear-gradient(135deg, rgba(255, 122, 24, 0.11), rgba(255, 232, 211, 0.8));
    border: 1px solid rgba(255, 122, 24, 0.18);
  }

  .post-content .download-strip p {
    margin: 6px 0 0;
    color: var(--secondary);
  }

  .post-content .download-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }

  .post-content .download-meta span {
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.82);
    color: #8b4709;
    font-size: 0.9rem;
    font-weight: 600;
  }

  @keyframes pgFadeUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 960px) {
    .post-content .home-hero,
    .post-content .download-strip,
    .post-content .feature-grid,
    .post-content .video-grid,
    .post-content .media-grid,
    .post-content .hero-points,
    .post-content .hero-stats {
      grid-template-columns: 1fr;
    }

    .post-content .showcase-section.span-7,
    .post-content .showcase-section.span-5 {
      grid-column: span 12;
    }

    .post-content .hero-media img {
      min-height: 300px;
    }
  }

  @media (max-width: 640px) {
    .post-content .home-hero,
    .post-content .showcase-section,
    .post-content .download-strip {
      padding: 22px;
      border-radius: 22px;
    }

    .post-content .hero-title {
      font-size: 2.2rem;
    }

    .post-content .cta-primary,
    .post-content .cta-secondary {
      width: 100%;
    }

    .post-content .floating-note {
      position: static;
      display: inline-flex;
      margin-top: 12px;
      margin-right: 8px;
    }
  }
</style>
{{- end }}
