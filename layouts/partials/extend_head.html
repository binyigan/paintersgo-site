{{- if .IsHome }}
<style>
  :root {
    --pg-accent: #ff7a18;
    --pg-accent-strong: #ff5530;
    --pg-sand: #fff6ef;
    --pg-cream: #fffdf9;
    --pg-ink: #261812;
    --pg-muted: #77584a;
    --pg-line: rgba(255, 145, 74, 0.16);
    --pg-shadow: 0 28px 70px rgba(20, 12, 8, 0.14);
  }

  .list {
    background:
      radial-gradient(circle at top left, rgba(255, 165, 92, 0.14), transparent 26%),
      radial-gradient(circle at 85% 8%, rgba(255, 218, 176, 0.2), transparent 22%),
      linear-gradient(180deg, #fff8f1 0%, #fffdfa 42%, #ffffff 100%);
  }

  .main,
  .nav {
    max-width: 1280px;
  }

  .post-content {
    margin-top: 0;
  }

  .header {
    backdrop-filter: blur(16px);
    background: rgba(255, 252, 248, 0.8);
    border-bottom: 1px solid rgba(255, 145, 74, 0.08);
  }

  .header .logo a,
  .header #menu a {
    color: rgba(47, 29, 19, 0.92);
  }

  .landing-shell {
    display: grid;
    gap: 28px;
    margin: 14px 0 56px;
  }

  .landing-hero,
  .capability-grid,
  .proof-grid,
  .gallery-section,
  .portfolio-strip,
  .download-section,
  .story-section {
    position: relative;
  }

  .landing-hero {
    display: grid;
    grid-template-columns: minmax(320px, 0.42fr) minmax(0, 0.58fr);
    gap: 24px;
    align-items: stretch;
  }

  .hero-panel,
  .gallery-section,
  .portfolio-strip,
  .download-panel,
  .story-section {
    border: 1px solid var(--pg-line);
    border-radius: 30px;
    background: linear-gradient(180deg, rgba(255, 249, 243, 0.94), rgba(255, 255, 255, 0.96));
    box-shadow: var(--pg-shadow);
  }

  .hero-panel {
    display: grid;
    align-content: start;
    gap: 18px;
    padding: 34px;
    background:
      radial-gradient(circle at top right, rgba(255, 164, 90, 0.16), transparent 24%),
      linear-gradient(180deg, rgba(36, 24, 19, 0.97), rgba(19, 13, 10, 0.99));
    border-color: rgba(255, 176, 108, 0.14);
  }

  .hero-badge,
  .section-kicker {
    display: inline-flex;
    width: fit-content;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .hero-badge {
    background: rgba(255, 164, 90, 0.14);
    color: #ffc790;
  }

  .section-kicker {
    background: rgba(255, 122, 24, 0.09);
    color: #a14907;
  }

  .hero-title {
    margin: 0;
    color: #fff5ec;
    font-size: clamp(2.6rem, 4vw, 4.8rem);
    line-height: 0.98;
    letter-spacing: -0.045em;
  }

  .hero-subtitle {
    margin: 0;
    color: rgba(255, 231, 214, 0.78);
    font-size: 1.05rem;
    line-height: 1.82;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .cta-primary,
  .cta-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 164px;
    padding: 14px 22px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }

  .cta-primary {
    color: #fff;
    background: linear-gradient(135deg, var(--pg-accent), var(--pg-accent-strong));
    box-shadow: 0 18px 38px rgba(255, 91, 46, 0.28);
  }

  .cta-secondary {
    color: #fff4e8;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 221, 198, 0.14);
  }

  .cta-primary:hover,
  .cta-secondary:hover,
  .stage-tab:hover {
    transform: translateY(-2px);
  }

  .hero-metrics,
  .hero-points,
  .capability-grid,
  .proof-grid,
  .gallery-grid,
  .story-grid {
    display: grid;
    gap: 16px;
  }

  .hero-metrics {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .hero-metric,
  .hero-point,
  .capability-card,
  .proof-card,
  .story-card {
    border-radius: 24px;
  }

  .hero-metric,
  .hero-point {
    padding: 16px 18px;
    border: 1px solid rgba(255, 188, 133, 0.12);
    background: rgba(255, 255, 255, 0.05);
  }

  .hero-metric strong {
    display: block;
    margin-bottom: 6px;
    color: #ffb670;
    font-size: 1.35rem;
  }

  .hero-metric span,
  .hero-point span {
    color: rgba(255, 232, 215, 0.74);
    line-height: 1.6;
  }

  .hero-point strong {
    display: block;
    margin-bottom: 8px;
    color: #fff3e8;
  }

  .hero-stage-shell {
    position: relative;
    min-height: 740px;
    overflow: hidden;
    border-radius: 32px;
    border: 1px solid rgba(255, 171, 101, 0.16);
    background:
      radial-gradient(circle at top, rgba(255, 181, 108, 0.15), transparent 24%),
      linear-gradient(180deg, #38241a 0%, #140e0b 100%);
    box-shadow: 0 30px 80px rgba(18, 10, 6, 0.28);
  }

  .hero-stage-glow {
    position: absolute;
    border-radius: 999px;
    filter: blur(10px);
    pointer-events: none;
  }

  .hero-stage-glow-a {
    top: -3%;
    right: 8%;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(255, 162, 79, 0.26), transparent 72%);
  }

  .hero-stage-glow-b {
    bottom: 8%;
    left: -3%;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(255, 108, 56, 0.16), transparent 72%);
  }

  .hero-canvas {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 740px;
    cursor: grab;
  }

  .hero-canvas.is-dragging {
    cursor: grabbing;
  }

  .hero-stage-overlay {
    position: absolute;
    inset: 0;
    display: grid;
    align-content: space-between;
    padding: 22px;
    pointer-events: none;
  }

  .stage-copy-card,
  .stage-tabs {
    pointer-events: auto;
  }

  .stage-copy-card {
    justify-self: end;
    width: min(360px, calc(100% - 24px));
    padding: 22px;
    border-radius: 26px;
    border: 1px solid rgba(255, 221, 195, 0.12);
    background: linear-gradient(180deg, rgba(31, 20, 15, 0.76), rgba(17, 11, 8, 0.82));
    box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
    backdrop-filter: blur(18px);
  }

  .stage-copy-card .section-kicker {
    margin-bottom: 10px;
    background: rgba(255, 255, 255, 0.08);
    color: #ffc997;
  }

  .stage-copy-card h2 {
    margin: 0 0 10px;
    color: #fff4ea;
    font-size: 1.42rem;
    line-height: 1.15;
  }

  .stage-copy-card p {
    margin: 0;
    color: rgba(255, 236, 222, 0.78);
    line-height: 1.68;
  }

  .stage-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-self: end;
  }

  .stage-tab {
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 232, 215, 0.14);
    background: rgba(255, 255, 255, 0.08);
    color: #fff4ea;
    font-weight: 700;
    backdrop-filter: blur(14px);
  }

  .stage-tab.is-active {
    background: rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 197, 146, 0.34);
  }

  .capability-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .capability-card,
  .proof-card,
  .story-card {
    padding: 24px;
    border: 1px solid var(--pg-line);
    background: linear-gradient(180deg, rgba(255, 250, 245, 0.94), rgba(255, 255, 255, 0.98));
    box-shadow: var(--pg-shadow);
  }

  .capability-card h2,
  .proof-copy h2,
  .gallery-copy h3,
  .story-card h3 {
    margin: 10px 0 8px;
    color: var(--pg-ink);
  }

  .capability-card p,
  .proof-copy p,
  .gallery-copy p,
  .story-card p,
  .section-intro,
  .download-panel p {
    color: var(--pg-muted);
    line-height: 1.72;
  }

  .proof-grid {
    grid-template-columns: 1.2fr 0.8fr 0.8fr;
  }

  .proof-card-wide {
    grid-column: span 1;
  }

  .proof-media,
  .gallery-card img,
  .portfolio-grid img {
    overflow: hidden;
    border-radius: 20px;
    background: #eadfd4;
  }

  .proof-media img,
  .proof-media video,
  .gallery-card img,
  .portfolio-grid img {
    width: 100%;
    display: block;
    object-fit: cover;
  }

  .proof-media img,
  .gallery-card img {
    aspect-ratio: 16 / 10;
  }

  .proof-media-video video {
    aspect-ratio: 16 / 9;
  }

  .proof-copy {
    margin-top: 18px;
  }

  .media-tags,
  .download-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }

  .media-tags span,
  .download-meta span,
  .story-link {
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255, 122, 24, 0.1);
    color: #964200;
    font-size: 0.88rem;
    font-weight: 700;
    text-decoration: none;
  }

  .gallery-section,
  .portfolio-strip,
  .story-section {
    padding: 28px;
  }

  .section-head {
    margin-bottom: 18px;
  }

  .section-title {
    margin: 10px 0 8px;
    color: var(--pg-ink);
    font-size: clamp(2rem, 3vw, 3rem);
    line-height: 1.04;
    letter-spacing: -0.03em;
  }

  .gallery-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .gallery-card {
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid var(--pg-line);
    background: rgba(255, 255, 255, 0.9);
    box-shadow: var(--pg-shadow);
  }

  .gallery-card-large {
    grid-column: span 2;
  }

  .gallery-card-accent {
    background: linear-gradient(180deg, rgba(255, 246, 235, 0.98), rgba(255, 252, 247, 0.98));
  }

  .gallery-copy {
    padding: 18px;
  }

  .portfolio-grid {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr 1.05fr;
    gap: 14px;
  }

  .portfolio-grid img {
    aspect-ratio: 4 / 5;
    border-radius: 24px;
    box-shadow: var(--pg-shadow);
  }

  .download-panel {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 20px;
    align-items: center;
    padding: 30px;
    background:
      radial-gradient(circle at top right, rgba(255, 183, 107, 0.18), transparent 28%),
      linear-gradient(135deg, rgba(255, 122, 24, 0.11), rgba(255, 246, 235, 0.94));
  }

  .download-actions {
    display: grid;
    gap: 12px;
    min-width: 280px;
    padding: 22px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.9);
    box-shadow: 0 18px 34px rgba(84, 43, 14, 0.08);
  }

  .download-actions .cta-primary {
    width: 100%;
  }

  .story-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  @media (max-width: 1100px) {
    .landing-hero,
    .proof-grid,
    .download-panel {
      grid-template-columns: 1fr;
    }

    .capability-grid,
    .gallery-grid,
    .story-grid,
    .portfolio-grid {
      grid-template-columns: 1fr;
    }

    .gallery-card-large {
      grid-column: auto;
    }
  }

  @media (max-width: 760px) {
    .hero-panel,
    .gallery-section,
    .portfolio-strip,
    .download-panel,
    .story-section {
      padding: 22px;
      border-radius: 24px;
    }

    .hero-title {
      font-size: 2.5rem;
    }

    .hero-stage-shell,
    .hero-canvas {
      min-height: 560px;
      border-radius: 24px;
    }

    .hero-actions,
    .hero-metrics {
      grid-template-columns: 1fr;
      display: grid;
    }

    .cta-primary,
    .cta-secondary {
      width: 100%;
    }

    .stage-copy-card {
      width: auto;
      justify-self: stretch;
      padding: 18px;
    }
  }
</style>
{{- end }}
