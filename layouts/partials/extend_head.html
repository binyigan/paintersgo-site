{{- if .IsHome }}
<style>
  :root {
    --pg-accent: #ff7a18;
    --pg-accent-strong: #ff5530;
    --pg-accent-soft: rgba(255, 122, 24, 0.14);
    --pg-border: rgba(255, 145, 74, 0.18);
    --pg-shadow: 0 24px 70px rgba(17, 10, 6, 0.18);
    --pg-panel: rgba(255, 252, 248, 0.84);
    --pg-panel-strong: rgba(255, 255, 255, 0.92);
    --pg-night: #1e1410;
    --pg-night-soft: #3a2418;
  }

  .list {
    background:
      radial-gradient(circle at top left, rgba(255, 164, 90, 0.16), transparent 24%),
      radial-gradient(circle at 85% 10%, rgba(255, 224, 192, 0.24), transparent 26%),
      linear-gradient(180deg, #fff8f1 0%, #fffdfb 34%, #ffffff 100%);
  }

  .main {
    max-width: 1280px;
  }

  .post-content {
    margin-top: 0;
  }

  .header {
    backdrop-filter: blur(14px);
    background: rgba(255, 252, 248, 0.78);
    border-bottom: 1px solid rgba(255, 145, 74, 0.08);
  }

  .nav {
    max-width: 1280px;
  }

  .world-home {
    display: grid;
    gap: 28px;
    margin: 14px 0 56px;
  }

  .world-stage {
    display: grid;
    grid-template-columns: minmax(300px, 0.42fr) minmax(0, 0.58fr);
    gap: 24px;
    align-items: stretch;
    min-height: calc(100vh - 110px);
  }

  .world-copy,
  .world-modules,
  .world-story-strip {
    position: relative;
    border: 1px solid var(--pg-border);
    border-radius: 30px;
    background: linear-gradient(180deg, rgba(255, 248, 241, 0.9), rgba(255, 255, 255, 0.95));
    box-shadow: var(--pg-shadow);
  }

  .world-copy {
    display: grid;
    align-content: start;
    gap: 18px;
    padding: 34px;
    overflow: hidden;
  }

  .world-copy::before,
  .world-modules::before,
  .world-story-strip::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background:
      linear-gradient(125deg, rgba(255, 255, 255, 0.3), transparent 42%),
      radial-gradient(circle at top right, rgba(255, 178, 112, 0.12), transparent 24%);
    pointer-events: none;
  }

  .hero-badge {
    display: inline-flex;
    width: fit-content;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--pg-accent-soft);
    color: #9a4300;
    font-size: 0.92rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .world-title {
    margin: 0;
    font-size: clamp(2.5rem, 4vw, 4.6rem);
    line-height: 1;
    letter-spacing: -0.045em;
  }

  .world-subtitle {
    margin: 0;
    color: var(--secondary);
    font-size: 1.04rem;
    line-height: 1.85;
  }

  .world-stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .world-stat {
    padding: 14px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255, 145, 74, 0.14);
    background: rgba(255, 255, 255, 0.74);
    box-shadow: 0 12px 28px rgba(57, 29, 11, 0.05);
  }

  .world-stat strong {
    display: block;
    margin-bottom: 4px;
    color: #a44a08;
    font-size: 1.4rem;
    line-height: 1;
  }

  .world-stat span {
    color: var(--secondary);
    font-size: 0.92rem;
    line-height: 1.55;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .cta-primary,
  .cta-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 168px;
    padding: 14px 22px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }

  .cta-primary {
    color: #fff;
    background: linear-gradient(135deg, var(--pg-accent), var(--pg-accent-strong));
    box-shadow: 0 18px 38px rgba(255, 91, 46, 0.28);
  }

  .cta-secondary {
    color: var(--primary);
    border: 1px solid var(--pg-border);
    background: rgba(255, 255, 255, 0.76);
  }

  .cta-primary:hover,
  .cta-secondary:hover,
  .world-module-chip:hover,
  .world-hotspot:hover {
    transform: translateY(-2px);
  }

  .world-points,
  .world-panel-grid,
  .story-grid {
    display: grid;
    gap: 14px;
  }

  .world-points {
    grid-template-columns: 1fr;
  }

  .hero-point,
  .feature-card,
  .world-module-chip,
  .world-status span {
    border: 1px solid rgba(255, 145, 74, 0.14);
    background: rgba(255, 255, 255, 0.72);
    box-shadow: 0 12px 28px rgba(57, 29, 11, 0.05);
  }

  .hero-point,
  .feature-card {
    padding: 16px 18px;
    border-radius: 22px;
  }

  .hero-point strong,
  .feature-card h3 {
    display: block;
    margin-bottom: 8px;
    font-size: 1rem;
  }

  .hero-point span,
  .feature-card p,
  .section-intro,
  .download-strip p {
    color: var(--secondary);
    line-height: 1.72;
  }

  .world-viewport-shell {
    position: relative;
    min-height: calc(100vh - 110px);
  }

  .world-viewport {
    position: sticky;
    top: 84px;
    min-height: calc(100vh - 110px);
    overflow: hidden;
    border-radius: 32px;
    border: 1px solid rgba(255, 160, 96, 0.18);
    background:
      radial-gradient(circle at top, rgba(255, 182, 108, 0.12), transparent 24%),
      linear-gradient(180deg, #39241a 0%, #170f0c 100%);
    box-shadow: 0 30px 80px rgba(22, 11, 6, 0.3);
  }

  .world-ambient {
    position: absolute;
    border-radius: 999px;
    pointer-events: none;
    filter: blur(8px);
    opacity: 0.8;
  }

  .world-ambient-a {
    top: -6%;
    right: 8%;
    width: 240px;
    height: 240px;
    background: radial-gradient(circle, rgba(255, 166, 73, 0.28), transparent 72%);
  }

  .world-ambient-b {
    bottom: 10%;
    left: -4%;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(255, 111, 61, 0.18), transparent 72%);
  }

  .world-canvas {
    display: block;
    width: 100%;
    height: 100%;
    min-height: calc(100vh - 110px);
    cursor: grab;
  }

  .world-canvas.is-dragging {
    cursor: grabbing;
  }

  .world-hud,
  .world-status {
    position: absolute;
    left: 20px;
    right: 20px;
    display: flex;
    pointer-events: none;
  }

  .world-hud {
    top: 18px;
    justify-content: space-between;
  }

  .world-status {
    bottom: 18px;
    gap: 10px;
    flex-wrap: wrap;
  }

  .world-hotspot {
    position: absolute;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 52px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255, 236, 221, 0.2);
    background: rgba(255, 248, 240, 0.14);
    color: #fff5eb;
    font-weight: 800;
    backdrop-filter: blur(14px);
    box-shadow: 0 12px 28px rgba(7, 4, 2, 0.28);
    pointer-events: auto;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .world-hotspot span {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.18);
  }

  .world-hotspot em {
    font-style: normal;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.92;
  }

  .world-hotspot.is-active,
  .world-module-chip.is-active {
    background: rgba(255, 255, 255, 0.22);
    border-color: rgba(255, 194, 137, 0.4);
  }

  .hotspot-overview { top: 18%; left: 18%; }
  .hotspot-ar { top: 20%; right: 17%; }
  .hotspot-motion { bottom: 25%; left: 17%; }
  .hotspot-screens { bottom: 19%; right: 22%; }
  .hotspot-download { bottom: 12%; left: 50%; transform: translateX(-50%); }

  .world-status span {
    padding: 8px 12px;
    border-radius: 999px;
    color: #f7e8dd;
    background: rgba(255, 250, 245, 0.12);
  }

  .world-stage-card {
    position: absolute;
    right: 22px;
    bottom: 26px;
    z-index: 2;
    width: min(340px, calc(100% - 44px));
    padding: 20px;
    border-radius: 24px;
    border: 1px solid rgba(255, 223, 198, 0.14);
    background: linear-gradient(180deg, rgba(30, 20, 16, 0.78), rgba(17, 10, 8, 0.82));
    box-shadow: 0 18px 48px rgba(0, 0, 0, 0.26);
    backdrop-filter: blur(18px);
  }

  .world-stage-card .section-kicker {
    margin-bottom: 10px;
    background: rgba(255, 255, 255, 0.08);
    color: #ffcb9a;
  }

  .world-stage-card h2 {
    margin: 0 0 8px;
    color: #fff2e7;
    font-size: 1.4rem;
    line-height: 1.15;
  }

  .world-stage-card p {
    margin: 0;
    color: rgba(255, 237, 223, 0.82);
    line-height: 1.65;
  }

  .world-stage-card-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .world-stage-jump,
  .world-stage-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 14px;
    border-radius: 999px;
    font-weight: 700;
    text-decoration: none;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .world-stage-jump {
    border: 1px solid rgba(255, 170, 104, 0.28);
    background: linear-gradient(135deg, rgba(255, 122, 24, 0.92), rgba(255, 85, 48, 0.92));
    color: #fff;
  }

  .world-stage-link {
    border: 1px solid rgba(255, 235, 216, 0.16);
    background: rgba(255, 255, 255, 0.06);
    color: #fff3e8;
  }

  .world-modules,
  .world-story-strip {
    padding: 28px;
  }

  .world-modules {
    display: grid;
    gap: 20px;
  }

  .world-modules-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 16px;
    align-items: start;
  }

  .world-modules-pills {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 10px;
  }

  .world-modules-pills span {
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255, 122, 24, 0.08);
    color: #964200;
    font-size: 0.88rem;
    font-weight: 700;
  }

  .world-modules-layout {
    display: grid;
    grid-template-columns: minmax(240px, 0.34fr) minmax(0, 0.66fr);
    gap: 18px;
    align-items: start;
  }

  .world-module-nav {
    position: sticky;
    top: 100px;
    display: grid;
    gap: 12px;
  }

  .world-module-chip {
    display: grid;
    gap: 6px;
    padding: 16px;
    border-radius: 22px;
    text-align: left;
    color: #723913;
    font-weight: 700;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .world-module-chip strong {
    font-size: 1rem;
    line-height: 1.2;
  }

  .world-module-chip span {
    color: var(--secondary);
    font-size: 0.92rem;
    font-weight: 500;
    line-height: 1.55;
  }

  .world-module-panels {
    position: relative;
    z-index: 2;
    width: min(980px, calc(100vw - 72px));
    max-height: min(86vh, 920px);
    padding: 24px;
    border-radius: 28px;
    border: 1px solid rgba(255, 214, 187, 0.16);
    background: linear-gradient(180deg, rgba(255, 253, 249, 0.97), rgba(255, 247, 239, 0.95));
    box-shadow: 0 32px 90px rgba(13, 8, 5, 0.26);
    overflow: auto;
  }

  .world-panel {
    position: absolute;
    inset: 92px 24px 24px;
    display: grid;
    grid-template-columns: minmax(0, 0.52fr) minmax(0, 0.48fr);
    gap: 22px;
    opacity: 0;
    transform: translateY(16px);
    pointer-events: none;
    transition: opacity 0.28s ease, transform 0.28s ease;
  }

  .world-module-drawer {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: grid;
    place-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .world-module-drawer.is-open {
    opacity: 1;
    pointer-events: auto;
  }

  .world-module-drawer-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(20, 10, 6, 0.42);
    backdrop-filter: blur(10px);
  }

  .world-drawer-head {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 16px;
    padding-right: 68px;
  }

  .world-drawer-close {
    position: absolute;
    top: 0;
    right: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 56px;
    height: 44px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 145, 74, 0.16);
    background: rgba(255, 255, 255, 0.92);
    color: #723913;
    font-weight: 700;
  }

  .world-panel.is-active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .world-panel-media,
  .world-panel-copy {
    border-radius: 28px;
    overflow: hidden;
  }

  .world-panel-media {
    display: grid;
    align-content: stretch;
    background: linear-gradient(180deg, rgba(49, 29, 17, 0.96), rgba(24, 14, 11, 0.98));
    box-shadow: 0 24px 60px rgba(25, 14, 7, 0.24);
  }

  .world-panel-copy {
    padding: 28px;
    border: 1px solid var(--pg-border);
    background: var(--pg-panel-strong);
  }

  .world-panel-media img,
  .world-panel-media video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .world-panel-media-stack {
    grid-template-rows: 1fr 1fr;
    gap: 1px;
  }

  .world-panel-media-grid {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
  }

  .world-panel-media-download {
    place-items: center;
    padding: 36px;
  }

  .world-panel-media-download img {
    max-width: 260px;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 24px 50px rgba(255, 122, 24, 0.18));
  }

  .section-kicker {
    display: inline-flex;
    margin-bottom: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(255, 122, 24, 0.1);
    color: #984300;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .section-title {
    margin: 0 0 10px;
    font-size: clamp(2rem, 3vw, 3rem);
    line-height: 1.04;
    letter-spacing: -0.03em;
  }

  .section-intro {
    margin: 0 0 20px;
  }

  .world-panel-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .media-card,
  .download-strip,
  .download-cta-box {
    border-radius: 24px;
  }

  .media-card {
    padding: 20px;
    border: 1px solid rgba(255, 145, 74, 0.14);
    background: rgba(255, 250, 245, 0.86);
  }

  .media-tags,
  .download-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .media-tags span,
  .download-meta span,
  .story-link {
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(255, 122, 24, 0.1);
    color: #934300;
    font-size: 0.9rem;
    font-weight: 700;
    text-decoration: none;
  }

  .download-strip {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(240px, 0.7fr);
    gap: 18px;
    padding: 24px;
    border: 1px solid rgba(255, 145, 74, 0.16);
    background:
      radial-gradient(circle at top right, rgba(255, 184, 115, 0.2), transparent 30%),
      linear-gradient(135deg, rgba(255, 122, 24, 0.12), rgba(255, 242, 229, 0.92));
  }

  .download-cta-box {
    display: grid;
    gap: 12px;
    place-items: center;
    padding: 20px;
    background: rgba(255, 255, 255, 0.84);
  }

  .story-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .story-card {
    position: relative;
  }

  .story-link {
    display: inline-flex;
    margin-top: 12px;
  }

  @media (max-width: 1100px) {
    .world-stage,
    .world-panel,
    .world-modules-layout,
    .world-modules-head {
      grid-template-columns: 1fr;
    }

    .world-viewport,
    .world-canvas {
      min-height: 72vh;
    }

    .world-module-nav {
      position: relative;
      top: auto;
    }

    .story-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 760px) {
    .world-copy,
    .world-modules,
    .world-story-strip {
      padding: 22px;
      border-radius: 24px;
    }

    .world-title {
      font-size: 2.35rem;
    }

    .world-stats {
      grid-template-columns: 1fr;
    }

    .world-viewport {
      top: 72px;
      border-radius: 24px;
    }

    .world-viewport,
    .world-canvas {
      min-height: 62vh;
    }

    .hero-actions,
    .world-module-nav,
    .download-strip,
    .world-panel-grid {
      grid-template-columns: 1fr;
      display: grid;
    }

    .cta-primary,
    .cta-secondary {
      width: 100%;
    }

    .world-status {
      right: 14px;
      left: 14px;
      bottom: 14px;
    }

    .world-stage-card {
      right: 14px;
      left: 14px;
      bottom: 68px;
      width: auto;
      padding: 16px;
    }

    .world-stage-card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .world-module-panels {
      width: min(100vw - 24px, 980px);
      max-height: min(90vh, 920px);
      padding: 16px;
      border-radius: 22px;
    }

    .world-panel {
      inset: 82px 16px 16px;
      grid-template-columns: 1fr;
    }

    .world-hotspot {
      min-height: 44px;
      padding: 7px 10px;
      font-size: 0.82rem;
    }

    .world-hotspot em {
      display: none;
    }
  }
</style>
{{- end }}
