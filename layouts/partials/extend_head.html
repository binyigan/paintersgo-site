{{- if .IsHome }}
<style>
  :root {
    --pg-accent: #ff7a18;
    --pg-accent-soft: rgba(255, 122, 24, 0.14);
    --pg-accent-strong: #ff5b2e;
    --pg-surface: linear-gradient(180deg, rgba(255, 248, 241, 0.96), rgba(255, 255, 255, 0.92));
    --pg-card: rgba(255, 255, 255, 0.84);
    --pg-border: rgba(255, 122, 24, 0.16);
    --pg-shadow: 0 22px 60px rgba(110, 59, 20, 0.12);
    --pg-deep-shadow: 0 26px 70px rgba(84, 46, 17, 0.18);
  }

  .list {
    background:
      radial-gradient(circle at top left, rgba(255, 154, 72, 0.18), transparent 28%),
      radial-gradient(circle at top right, rgba(255, 220, 173, 0.2), transparent 25%),
      linear-gradient(180deg, #fff7ee 0%, #fffdfa 38%, #ffffff 100%);
  }

  .main {
    max-width: 1180px;
  }

  .post-content {
    margin-top: 0;
  }

  .post-content .home-showcase {
    display: grid;
    gap: 28px;
    margin: 12px 0 56px;
  }

  .post-content .home-hero {
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
    gap: 28px;
    padding: 36px;
    border: 1px solid var(--pg-border);
    border-radius: 30px;
    background: var(--pg-surface);
    box-shadow: var(--pg-shadow);
  }

  .post-content .home-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(120deg, rgba(255, 255, 255, 0.3), transparent 40%),
      radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.48), transparent 22%);
    pointer-events: none;
  }

  .post-content .home-hero::after {
    content: "";
    position: absolute;
    inset: auto -100px -100px auto;
    width: 280px;
    height: 280px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(255, 122, 24, 0.22), transparent 68%);
    pointer-events: none;
  }

  .post-content .hero-copy,
  .post-content .hero-media,
  .post-content .showcase-section,
  .post-content .media-card,
  .post-content .feature-card,
  .post-content .download-strip {
    position: relative;
    z-index: 1;
  }

  .post-content .hero-copy,
  .post-content .showcase-section {
    animation: pgFadeUp 0.7s ease both;
  }

  .post-content .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--pg-accent-soft);
    color: #9b4300;
    font-size: 0.92rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .post-content .hero-title {
    margin: 18px 0 12px;
    font-size: clamp(2.3rem, 4vw, 4.3rem);
    line-height: 1.02;
    letter-spacing: -0.04em;
  }

  #menu .lang-switch {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 0 10px;
    padding: 0;
    list-style: none;
  }

  #menu .lang-switch li {
    margin: 0;
  }

  #menu .lang-switch a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    height: 36px;
    padding: 0 10px;
    border-radius: 999px;
    border: 1px solid rgba(255, 122, 24, 0.16);
    background: rgba(255, 255, 255, 0.72);
    font-size: 0.86rem;
    font-weight: 700;
    line-height: 1;
  }

  .post-content .hero-subtitle {
    max-width: 62ch;
    margin: 0;
    color: var(--secondary);
    font-size: 1.05rem;
    line-height: 1.85;
  }

  .post-content .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 24px;
  }

  .post-content .cta-primary,
  .post-content .cta-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 160px;
    padding: 14px 20px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .post-content .cta-primary {
    background: linear-gradient(135deg, var(--pg-accent), var(--pg-accent-strong));
    color: #fff;
    box-shadow: 0 18px 40px rgba(255, 91, 46, 0.28);
  }

  .post-content .cta-secondary {
    border: 1px solid var(--pg-border);
    background: rgba(255, 255, 255, 0.72);
    color: var(--primary);
  }

  .post-content .cta-primary:hover,
  .post-content .cta-secondary:hover {
    transform: translateY(-2px);
  }

  .post-content .cta-secondary:hover {
    border-color: rgba(255, 122, 24, 0.35);
  }

  .post-content .hero-points {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 24px;
  }

  .post-content .hero-point,
  .post-content .hero-stat {
    padding: 14px 16px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.74);
    border: 1px solid rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
  }

  .post-content .hero-point strong {
    display: block;
    margin-bottom: 6px;
    font-size: 1rem;
  }

  .post-content .hero-point span,
  .post-content .hero-stat span {
    color: var(--secondary);
    font-size: 0.94rem;
    line-height: 1.65;
  }

  .post-content .hero-stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 14px;
  }

  .post-content .hero-stat strong {
    display: block;
    margin-bottom: 6px;
    color: #a24b08;
    font-size: 1.7rem;
    line-height: 1;
  }

  .post-content .hero-media {
    position: relative;
    align-self: stretch;
  }

  .post-content .hero-media > img {
    width: 100%;
    height: 100%;
    min-height: 420px;
    object-fit: cover;
    border-radius: 24px;
    box-shadow: var(--pg-deep-shadow);
  }

  .post-content .scene-shell {
    --scene-rotate-x: 0deg;
    --scene-rotate-y: 0deg;
    --scene-shift-x: 0px;
    --scene-shift-y: 0px;
    display: grid;
    gap: 16px;
    perspective: 1800px;
  }

  .post-content .scene-stage {
    position: relative;
    min-height: 520px;
    padding: 26px;
    overflow: hidden;
    border-radius: 30px;
    border: 1px solid rgba(255, 122, 24, 0.2);
    background:
      radial-gradient(circle at 18% 18%, rgba(255, 219, 184, 0.88), transparent 28%),
      radial-gradient(circle at 84% 20%, rgba(255, 170, 91, 0.28), transparent 24%),
      linear-gradient(180deg, rgba(72, 39, 15, 0.92), rgba(24, 16, 10, 0.96));
    box-shadow: var(--pg-deep-shadow);
    transform-style: preserve-3d;
    transform: rotateX(var(--scene-rotate-x)) rotateY(var(--scene-rotate-y));
    transition: transform 180ms ease, box-shadow 180ms ease;
  }

  .post-content .scene-backdrop,
  .post-content .scene-glow {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .post-content .scene-backdrop {
    inset: 8% 6%;
    border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background:
      linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 48%),
      radial-gradient(circle at center, rgba(255, 145, 74, 0.16), rgba(255, 145, 74, 0) 62%);
    transform: translateZ(-120px);
  }

  .post-content .scene-glow-a {
    inset: auto auto 10% 8%;
    width: 180px;
    height: 180px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(255, 177, 86, 0.34), transparent 72%);
    transform: translate3d(calc(var(--scene-shift-x) * -0.4), calc(var(--scene-shift-y) * -0.4), 10px);
  }

  .post-content .scene-glow-b {
    inset: 9% 8% auto auto;
    width: 140px;
    height: 140px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(255, 119, 66, 0.28), transparent 72%);
    transform: translate3d(calc(var(--scene-shift-x) * 0.25), calc(var(--scene-shift-y) * 0.35), 30px);
  }

  .post-content .scene-card {
    position: absolute;
    display: grid;
    gap: 14px;
    width: min(70%, 380px);
    padding: 14px;
    border-radius: 22px;
    background: rgba(255, 251, 246, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 22px 50px rgba(5, 2, 0, 0.28);
    transform-style: preserve-3d;
    transition: transform 0.45s ease, opacity 0.35s ease, filter 0.35s ease;
  }

  .post-content .scene-card img {
    width: 100%;
    aspect-ratio: 16 / 10;
    object-fit: cover;
    border-radius: 16px;
    display: block;
    background: rgba(240, 222, 208, 0.9);
  }

  .post-content .scene-card-copy h3 {
    margin: 0 0 8px;
    font-size: 1.2rem;
    line-height: 1.2;
  }

  .post-content .scene-card-copy p {
    margin: 0;
    color: rgba(70, 47, 29, 0.78);
    font-size: 0.94rem;
    line-height: 1.6;
  }

  .post-content .scene-card-kicker {
    display: inline-flex;
    margin-bottom: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255, 122, 24, 0.12);
    color: #9b4300;
    font-size: 0.76rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .post-content .scene-card-main {
    top: 8%;
    left: 2%;
    transform: translate3d(calc(var(--scene-shift-x) * -0.25), calc(var(--scene-shift-y) * -0.2), 130px) rotateY(-10deg);
  }

  .post-content .scene-card-ar {
    top: 18%;
    right: 4%;
    width: min(48%, 250px);
    transform: translate3d(calc(var(--scene-shift-x) * 0.3), calc(var(--scene-shift-y) * -0.28), 80px) rotateY(16deg) rotateX(5deg);
  }

  .post-content .scene-card-video {
    left: 10%;
    bottom: 8%;
    width: min(48%, 250px);
    transform: translate3d(calc(var(--scene-shift-x) * -0.18), calc(var(--scene-shift-y) * 0.3), 45px) rotateY(-18deg) rotateX(-3deg);
  }

  .post-content .scene-card-gallery {
    right: 12%;
    bottom: 8%;
    width: min(44%, 220px);
    transform: translate3d(calc(var(--scene-shift-x) * 0.2), calc(var(--scene-shift-y) * 0.22), 28px) rotateY(14deg);
  }

  .post-content .scene-hotspot {
    position: absolute;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 999px;
    background: rgba(255, 248, 241, 0.14);
    color: #fff2e6;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    backdrop-filter: blur(10px);
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .post-content .scene-hotspot::before {
    content: "";
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: linear-gradient(135deg, #ffcd7a, #ff7a18);
    box-shadow: 0 0 0 6px rgba(255, 122, 24, 0.18);
  }

  .post-content .scene-hotspot:hover,
  .post-content .scene-hotspot.is-active,
  .post-content .scene-tab:hover,
  .post-content .scene-tab.is-active {
    transform: translateY(-2px);
  }

  .post-content .scene-hotspot.is-active,
  .post-content .scene-tab.is-active {
    background: rgba(255, 255, 255, 0.22);
    border-color: rgba(255, 188, 128, 0.44);
  }

  .post-content .hotspot-main {
    top: 9%;
    left: 6%;
    transform: translateZ(150px);
  }

  .post-content .hotspot-ar {
    top: 22%;
    right: 9%;
    transform: translateZ(110px);
  }

  .post-content .hotspot-video {
    left: 14%;
    bottom: 24%;
    transform: translateZ(90px);
  }

  .post-content .hotspot-gallery {
    right: 12%;
    bottom: 18%;
    transform: translateZ(65px);
  }

  .post-content .scene-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .post-content .scene-tab {
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 122, 24, 0.16);
    background: rgba(255, 255, 255, 0.72);
    color: #6d3814;
    font-weight: 700;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .post-content .scene-stage[data-scene-active="main"] .scene-card-main,
  .post-content .scene-stage[data-scene-active="ar"] .scene-card-ar,
  .post-content .scene-stage[data-scene-active="video"] .scene-card-video,
  .post-content .scene-stage[data-scene-active="gallery"] .scene-card-gallery {
    filter: none;
    opacity: 1;
    z-index: 4;
  }

  .post-content .scene-stage[data-scene-active="main"] .scene-card-main {
    transform: translate3d(calc(var(--scene-shift-x) * -0.2), calc(var(--scene-shift-y) * -0.12), 190px) rotateY(-7deg) scale(1.04);
  }

  .post-content .scene-stage[data-scene-active="ar"] .scene-card-ar {
    transform: translate3d(calc(var(--scene-shift-x) * 0.18), calc(var(--scene-shift-y) * -0.18), 180px) rotateY(8deg) scale(1.04);
  }

  .post-content .scene-stage[data-scene-active="video"] .scene-card-video {
    transform: translate3d(calc(var(--scene-shift-x) * -0.12), calc(var(--scene-shift-y) * 0.18), 170px) rotateY(-10deg) scale(1.05);
  }

  .post-content .scene-stage[data-scene-active="gallery"] .scene-card-gallery {
    transform: translate3d(calc(var(--scene-shift-x) * 0.12), calc(var(--scene-shift-y) * 0.18), 160px) rotateY(10deg) scale(1.05);
  }

  .post-content .scene-stage[data-scene-active="main"] .scene-card-ar,
  .post-content .scene-stage[data-scene-active="main"] .scene-card-video,
  .post-content .scene-stage[data-scene-active="main"] .scene-card-gallery,
  .post-content .scene-stage[data-scene-active="ar"] .scene-card-main,
  .post-content .scene-stage[data-scene-active="ar"] .scene-card-video,
  .post-content .scene-stage[data-scene-active="ar"] .scene-card-gallery,
  .post-content .scene-stage[data-scene-active="video"] .scene-card-main,
  .post-content .scene-stage[data-scene-active="video"] .scene-card-ar,
  .post-content .scene-stage[data-scene-active="video"] .scene-card-gallery,
  .post-content .scene-stage[data-scene-active="gallery"] .scene-card-main,
  .post-content .scene-stage[data-scene-active="gallery"] .scene-card-ar,
  .post-content .scene-stage[data-scene-active="gallery"] .scene-card-video {
    opacity: 0.55;
    filter: saturate(0.8);
  }

  .post-content .floating-note {
    position: absolute;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.84);
    border: 1px solid rgba(255, 255, 255, 0.92);
    box-shadow: 0 16px 34px rgba(63, 34, 10, 0.14);
    color: #8d4307;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    backdrop-filter: blur(10px);
  }

  .post-content .note-top {
    top: 18px;
    right: 18px;
  }

  .post-content .note-bottom {
    left: 18px;
    bottom: 18px;
  }

  .post-content .section-grid {
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: 18px;
  }

  .post-content .showcase-section {
    padding: 28px;
    border-radius: 26px;
    background: var(--pg-card);
    border: 1px solid rgba(255, 255, 255, 0.7);
    box-shadow: var(--pg-shadow);
    backdrop-filter: blur(14px);
  }

  .post-content .showcase-section.full-span {
    grid-column: span 12;
  }

  .post-content .showcase-section.span-7 {
    grid-column: span 7;
  }

  .post-content .showcase-section.span-5 {
    grid-column: span 5;
  }

  .post-content .section-kicker {
    display: inline-block;
    margin-bottom: 10px;
    color: #b35600;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .post-content .section-title {
    margin: 0 0 8px;
    font-size: 1.85rem;
    line-height: 1.2;
  }

  .post-content .section-intro {
    max-width: 72ch;
    margin: 0 0 20px;
    color: var(--secondary);
    line-height: 1.8;
  }

  .post-content .feature-grid,
  .post-content .media-grid,
  .post-content .video-grid,
  .post-content .story-grid {
    display: grid;
    gap: 16px;
  }

  .post-content .feature-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .post-content .story-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .post-content .media-grid,
  .post-content .video-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .post-content .feature-card,
  .post-content .media-card {
    padding: 18px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.9);
    transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
  }

  .post-content .feature-card:hover,
  .post-content .media-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 122, 24, 0.25);
    box-shadow: 0 22px 44px rgba(80, 41, 13, 0.12);
  }

  .post-content .feature-card h3,
  .post-content .media-card h3 {
    margin: 0 0 8px;
    font-size: 1.08rem;
  }

  .post-content .feature-card p,
  .post-content .media-card p {
    margin: 0;
    color: var(--secondary);
    line-height: 1.75;
  }

  .post-content .story-card {
    display: grid;
    align-content: start;
    gap: 14px;
    min-height: 100%;
  }

  .post-content .story-link {
    display: inline-flex;
    align-items: center;
    width: fit-content;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255, 122, 24, 0.1);
    color: #994800;
    font-weight: 700;
    text-decoration: none;
  }

  .post-content .media-card img,
  .post-content .media-card video {
    width: 100%;
    border-radius: 18px;
    display: block;
    margin-bottom: 14px;
    background: #eadfd4;
  }

  .post-content .media-card img {
    aspect-ratio: 16 / 10;
    object-fit: cover;
  }

  .post-content .media-card-featured {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 247, 238, 0.92));
    box-shadow: 0 26px 56px rgba(89, 48, 16, 0.14);
  }

  .post-content .media-card-featured img {
    min-height: 280px;
  }

  .post-content .media-card-wide {
    grid-column: span 2;
  }

  .post-content .media-card-tall img {
    aspect-ratio: 4 / 5;
  }

  .post-content .media-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }

  .post-content .media-tags span {
    padding: 7px 11px;
    border-radius: 999px;
    background: rgba(255, 122, 24, 0.1);
    color: #994800;
    font-size: 0.82rem;
    font-weight: 700;
  }

  .post-content .media-card video {
    aspect-ratio: 16 / 9;
    object-fit: cover;
  }

  .post-content .video-grid-asymmetric {
    grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.7fr);
    align-items: stretch;
  }

  .post-content .showroom-section {
    display: grid;
    grid-template-columns: minmax(280px, 0.92fr) minmax(0, 1.08fr);
    gap: 24px;
    align-items: stretch;
    overflow: hidden;
    background:
      radial-gradient(circle at top right, rgba(255, 185, 102, 0.18), transparent 28%),
      linear-gradient(180deg, rgba(255, 249, 243, 0.95), rgba(255, 243, 231, 0.92));
  }

  .post-content .showroom-copy {
    display: grid;
    gap: 16px;
    align-content: start;
  }

  .post-content .showroom-notes {
    position: relative;
    min-height: 188px;
  }

  .post-content .showroom-note {
    position: absolute;
    inset: 0;
    padding: 20px 20px 18px;
    border-radius: 22px;
    border: 1px solid rgba(255, 122, 24, 0.14);
    background: rgba(255, 255, 255, 0.76);
    box-shadow: 0 18px 40px rgba(92, 49, 18, 0.08);
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  .post-content .showroom-note.is-active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .post-content .showroom-note h3 {
    margin: 0 0 8px;
    font-size: 1.24rem;
  }

  .post-content .showroom-note p {
    margin: 0;
    color: var(--secondary);
    line-height: 1.72;
  }

  .post-content .showroom-note-label {
    display: inline-flex;
    margin-bottom: 10px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255, 122, 24, 0.1);
    color: #964200;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .post-content .showroom-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .post-content .showroom-chip {
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 122, 24, 0.16);
    background: rgba(255, 255, 255, 0.76);
    color: #713711;
    font-weight: 700;
